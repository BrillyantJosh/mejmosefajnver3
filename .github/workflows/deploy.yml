name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/apps/mejmosefajn
            # Allow root to operate on this repo even if it's owned by another uid
            # (git "dubious ownership" guard). Idempotent — only adds once.
            git config --global --get-all safe.directory 2>/dev/null | grep -qxF /opt/apps/mejmosefajn || git config --global --add safe.directory /opt/apps/mejmosefajn
            # This box is a deploy mirror — set aside any manual on-server edits (recoverable
            # via `git stash list`) so the pull always fast-forwards cleanly instead of aborting.
            git stash push --include-untracked -m "auto-stash before deploy" || true
            GIT_SSH_COMMAND="ssh -i /root/.ssh/github_deploy_mejmosefajn -o StrictHostKeyChecking=no" git pull --ff-only origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            # Compose sometimes races itself on recreate ("container is marked for
            # removal and cannot be started") — the app comes up, but the step goes
            # red and hides real failures. Retry once after a clean down.
            docker compose -f docker-compose.prod.yml up -d \
              || (echo "recreate raced — cleaning up and retrying"; \
                  docker compose -f docker-compose.prod.yml down --remove-orphans; \
                  docker compose -f docker-compose.prod.yml up -d)
            docker image prune -f
            echo "Deploy completed at $(date)"
